name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  stuff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm check
          pnpm build
